# 端口号
server:
  port: 6600

--- #################### 网关配置 ####################

spring:
  application:
    name: gateway
  cloud:
    nacos:
      server-addr: 10.1.32.242:8848
    gateway:
#      globalcors:
#        add-to-simple-url-handler-mapping: true
#        cors-configurations:
#          # 允许所有请求跨域
#          '[/**]':
#            # 允许所有源
#            allowed-origin-patterns: ''
#            # 允许所有方法
#            allowed-methods: '*'
#            # 允许所有请求头
#            allowed-headers: '*'
#      default-filters:
#        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
      routes:
        - id: permission
          uri: lb://permission
          predicates:
            - Path=/permission/**
          filters:
            - RewritePath=/permission/(?<segment>.*), /${segment}
            - UserIDHeader=X-USER-ID, ID
          order: 0
        - id: recruitment
          uri: lb://recruitment
          predicates:
            - Path=/recruitment/**
          filters:
            - RewritePath=/recruitment/(?<segment>.*), /${segment}
            - UserIDHeader=X-USER-ID, ID
          order: 1
        - id: sign
          uri: lb://sign
          predicates:
            - Path=/sign/**
          filters:
            - RewritePath=/sign/(?<segment>.*), /${segment}
            - UserIDHeader=X-USER-ID, ID
          order: 2
        - id: check
          uri: lb://check
          predicates:
            - Path=/check/**
          filters:
            - RewritePath=/check/(?<segment>.*), /${segment}
            - UserIDHeader=X-USER-ID, ID
          order: 3


--- #################### 数据库相关配置 ####################

spring:
  # 数据源配置项
  datasource:
    url: jdbc:mysql://10.1.8.212:3306/Permissions?useSSL=false&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true # MySQL Connector/J 8.X 连接的示例
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root # 数据库账号
    password: WZywb^sql57 # 数据库密码
    # HikariCP 自定义配置，对应 HikariConfig 配置属性类
    hikari:
      # 设置连接的最大生命周期，建议小于MySQL的wait_timeout设置
      max-lifetime: 1800000
      # 连接超时时间
      connection-timeout: 30000
      # 连接验证查询
      validation-timeout: 5000
      # 空闲连接最小数量
      minimum-idle: 5
      # 最大连接数
      maximum-pool-size: 20
      # 连接测试查询
      connection-test-query: SELECT 1
  # redis配置
  data:
    redis:
      database: 2
      host: 10.1.8.212
      port: 6379
      password: WZywb^reDis
      jedis:
        pool:
          max-active: 10
          min Idle: 5
          max Wait: -1
  main:
    allow-circular-references: true


