server:
  port: 6602
spring:
  application:
    name: permission
  profiles:
    active: product
  cloud:
    nacos:
      server-addr: 10.1.32.242:8848
      discovery:
        server-addr: 10.1.32.242:8848
        namespace: ${spring.profiles.active}
        group: DEFAULT_GROUP
      config:
        namespace: ${spring.profiles.active}
        import-check:
          enabled: false
    sentinel:
      transport:
        dashboard: ${data.sentinel.dashboard.url}

---
spring:
  config:
    activate:
      on-profile: dev
    import:
      - optional:nacos:permission.yml

---
spring:
  config:
    activate:
      on-profile: product
    import:
      optional:nacos:permission.yml

